<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="wfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Step 1: Upload -->
  <rect x="60" y="50" width="200" height="200" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Step number -->
  <circle cx="160" cy="30" r="20" fill="url(#wfGrad)"/>
  <text x="160" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">1</text>
  <!-- Upload icon -->
  <rect x="128" y="80" width="64" height="80" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <path d="M140 140L148 140L148 120L140 120L160 104L180 120L172 120L172 140L180 140" stroke="#2563EB" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Dashed upload indicator -->
  <line x1="144" y1="150" x2="176" y2="150" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Label -->
  <text x="160" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle">Upload</text>
  <text x="160" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Drop your documents</text>
  <text x="160" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">PDF, DOCX, images</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="150" x2="340" y2="150" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M335 144L345 150L335 156" fill="none" stroke="#2563EB" stroke-width="2"/>

  <!-- Step 2: AI Extract -->
  <rect x="350" y="50" width="200" height="200" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="450" cy="30" r="20" fill="url(#wfGrad)"/>
  <text x="450" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">2</text>
  <!-- Brain/gear icon -->
  <circle cx="450" cy="116" r="32" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <!-- Inner gear -->
  <circle cx="450" cy="116" r="16" fill="none" stroke="#6366F1" stroke-width="1.5"/>
  <circle cx="450" cy="116" r="6" fill="#6366F1"/>
  <!-- Gear teeth -->
  <line x1="450" y1="82" x2="450" y2="88" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="450" y1="144" x2="450" y2="150" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="416" y1="116" x2="422" y2="116" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="478" y1="116" x2="484" y2="116" stroke="#6366F1" stroke-width="2.5"/>
  <!-- Sparkles -->
  <path d="M424 88L426 92L430 94L426 96L424 100L422 96L418 94L422 92Z" fill="#2563EB"/>
  <path d="M476 88L478 92L482 94L478 96L476 100L474 96L470 94L474 92Z" fill="#2563EB"/>
  <!-- Label -->
  <text x="450" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle">AI Extract</text>
  <text x="450" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Intelligent data extraction</text>
  <text x="450" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">powered by LLMs</text>

  <!-- Arrow 2 -->
  <line x1="560" y1="150" x2="630" y2="150" stroke="#6366F1" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M625 144L635 150L625 156" fill="none" stroke="#6366F1" stroke-width="2"/>

  <!-- Step 3: Export -->
  <rect x="640" y="50" width="200" height="200" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="740" cy="30" r="20" fill="url(#wfGrad)"/>
  <text x="740" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">3</text>
  <!-- Spreadsheet icon -->
  <rect x="712" y="82" width="56" height="68" rx="4" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <!-- Grid -->
  <line x1="712" y1="98" x2="768" y2="98" stroke="#2563EB" stroke-width="1"/>
  <line x1="712" y1="114" x2="768" y2="114" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="712" y1="130" x2="768" y2="130" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="730" y1="82" x2="730" y2="150" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="750" y1="82" x2="750" y2="150" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Header cells -->
  <rect x="713" y="83" width="17" height="14" fill="#2563EB" opacity="0.1"/>
  <rect x="731" y="83" width="19" height="14" fill="#2563EB" opacity="0.1"/>
  <rect x="751" y="83" width="17" height="14" fill="#2563EB" opacity="0.1"/>
  <!-- Download arrow -->
  <path d="M740 140V160" stroke="#2563EB" stroke-width="2"/>
  <path d="M734 155L740 162L746 155" stroke="#2563EB" stroke-width="2" fill="none"/>
  <!-- Label -->
  <text x="740" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle">Export</text>
  <text x="740" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Download structured data</text>
  <text x="740" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Excel, CSV, JSON, API</text>
</svg>
