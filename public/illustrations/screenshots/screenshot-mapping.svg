  <text x="72" y="178" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">vendor_name</text>
  <text x="280" y="178" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">String</text>

  <rect x="40" y="200" width="308" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
