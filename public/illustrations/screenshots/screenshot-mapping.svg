<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="500" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect width="800" height="44" rx="12" fill="white"/>
  <circle cx="24" cy="22" r="5" fill="#EF4444"/>
  <circle cx="42" cy="22" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="22" r="5" fill="#22C55E"/>
  <line x1="0" y1="44" x2="800" y2="44" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Header -->
  <text x="24" y="76" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Template Mapping</text>
  <rect x="640" y="58" width="140" height="28" rx="6" fill="#2563EB"/>
  <text x="672" y="76" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Save Template</text>

