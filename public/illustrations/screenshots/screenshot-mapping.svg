  <rect x="690" y="254" width="52" height="16" rx="4" fill="#DCFCE7"/>
  <text x="700" y="266" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">98.5%</text>

  <rect x="452" y="288" width="308" height="36" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
  <text x="468" y="310" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">$12,450.00</text>
  <rect x="690" y="298" width="52" height="16" rx="4" fill="#DCFCE7"/>
  <text x="700" y="310" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">99.1%</text>

  <rect x="452" y="332" width="308" height="36" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="468" y="354" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">Net 30</text>
  <rect x="690" y="342" width="52" height="16" rx="4" fill="#FEF3C7"/>
  <text x="700" y="354" font-family="system-ui, sans-serif" font-size="8" fill="#D97706">92.3%</text>

  <rect x="452" y="376" width="308" height="36" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="468" y="398" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">4 line items</text>
  <rect x="690" y="386" width="52" height="16" rx="4" fill="#DCFCE7"/>
  <text x="700" y="398" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">97.6%</text>

  <!-- Mapping connection lines -->
  <line x1="348" y1="174" x2="452" y2="174" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="348" y1="218" x2="452" y2="218" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="348" y1="262" x2="452" y2="262" stroke="#6366F1" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="348" y1="306" x2="452" y2="306" stroke="#6366F1" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="348" y1="350" x2="452" y2="350" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="348" y1="394" x2="452" y2="394" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Connection dots -->
  <circle cx="348" cy="174" r="4" fill="#2563EB"/>
  <circle cx="452" cy="174" r="4" fill="#2563EB"/>
