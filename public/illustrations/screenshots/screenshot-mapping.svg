  <rect x="452" y="200" width="308" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="468" y="222" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">INV-2024-001847</text>
