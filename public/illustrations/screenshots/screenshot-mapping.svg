  <text x="700" y="222" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">99.8%</text>

  <rect x="452" y="244" width="308" height="36" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
